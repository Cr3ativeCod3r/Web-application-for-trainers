<div id="authModalLoginView">
    <form id="authModalLoginForm" onsubmit="submitAuthForm(event, '/logowanie/', 'login')" class="space-y-4 mt-2">
        {% csrf_token %}
        <div id="loginErrorMsg" class="hidden bg-red-50 border border-red-100 text-red-600 p-3 rounded-xl text-sm text-center"></div>

        <!-- Email -->
        <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">E-mail</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </span>
                <input type="email" name="username" id="loginEmail" required autocomplete="email"
                       placeholder="twoj@email.pl"
                       class="auth-modal-input">
            </div>
        </div>

        <!-- Password -->
        <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">Hasło</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </span>
                <input type="password" name="password" id="loginPassword" required autocomplete="current-password"
                       placeholder="••••••••"
                       class="auth-modal-input" style="padding-right:3rem">
                <button type="button" onclick="toggleModalPassword('loginPassword', this)"
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5 eye-show" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    <svg class="w-5 h-5 eye-hide hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
            </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between pt-1">
            <label class="flex items-center gap-2 cursor-pointer select-none text-gray-600 text-sm">
                <input type="checkbox" name="remember_me" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary cursor-pointer">
                Zapamiętaj mnie
            </label>
            <a href="{% url 'accounts:password_reset' %}" class="text-sm font-medium text-primary hover:text-primary-hover transition-colors">Zapomniałem hasła</a>
        </div>

        <button type="submit"
                class="w-full py-3.5 px-4 bg-primary hover:bg-primary-hover text-navy font-bold text-base rounded-xl shadow-md shadow-primary/25 hover:shadow-primary/40 transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0">
            Zaloguj się
        </button>
    </form>
    <div class="mt-5 text-center text-sm text-gray-500">
        Nie masz konta? <button onclick="toggleAuthView('register')" class="font-semibold text-primary hover:text-primary-hover transition-colors">Zarejestruj się</button>
    </div>
</div>
