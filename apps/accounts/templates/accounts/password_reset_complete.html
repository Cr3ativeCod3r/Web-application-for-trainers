{% extends 'base.html' %}
{% block content %}
<section class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-gray-50">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl text-center">
        <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h2 class="text-3xl font-bold text-navy mb-4">Hasło zmienione!</h2>
        <p class="text-gray-600 mb-8">Twoje hasło zostało pomyślnie zaktualizowane.</p>
        <a href="{% url 'accounts:login' %}" class="w-full inline-block py-3 px-4 bg-primary hover:bg-primary-hover text-navy font-bold rounded-lg transition-all">Zaloguj się teraz</a>
    </div>
</section>
{% endblock %}
