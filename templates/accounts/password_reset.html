{% extends 'base.html' %}
{% block content %}
<section class="min-h-[calc(100vh-200px)] flex items-center justify-center py-12 px-4 bg-gray-50">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl text-center">
        <h2 class="text-3xl font-bold text-navy mb-4">Zresetuj hasło</h2>
        <p class="text-gray-600 mb-8">Wpisz swój adres e-mail, a wyślemy Ci link do ustawienia nowego hasła.</p>
        
        <form method="POST" class="space-y-6 text-left">
            {% csrf_token %}
            <div>
                <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">Adres e-mail</label>
                {{ form.email }}
            </div>
            <button type="submit" class="w-full py-3 px-4 bg-primary hover:bg-primary-hover text-navy font-bold rounded-lg transition-all">Wyślij link</button>
        </form>
    </div>
</section>
<script>
    document.querySelector('input[type="email"]').classList.add('w-full', 'px-4', 'py-3', 'border', 'border-gray-300', 'rounded-lg', 'mt-1', 'outline-none', 'focus:ring-2', 'focus:ring-primary');
</script>
{% endblock %}
