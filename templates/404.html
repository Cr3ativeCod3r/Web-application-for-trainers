{% extends 'base.html' %}
{% load static %}

{% block title %}404 - Nie znaleziono strony | Coachly{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-xl w-full text-center">
        <!-- Graphic / Icon -->
        <div class="relative mb-10 w-48 h-48 mx-auto">
            <div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl animate-pulse"></div>
            <div class="relative bg-white rounded-full p-8 shadow-xl border border-gray-100 flex items-center justify-center">
                <svg class="w-24 h-24 text-navy" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <!-- Small floating elements for aesthetics -->
                <div class="absolute -top-4 -right-4 bg-primary text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg transform rotate-12">404</div>
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold text-navy mb-4 tracking-tight">Ups! Zgubiliśmy rytm.</h1>
        <p class="text-lg md:text-xl text-gray-500 mb-10 leading-relaxed max-w-md mx-auto">
            Wygląda na to, że strona, której szukasz nie istnieje, lub została przeniesiona.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'trainers:home_search' %}" class="bg-primary hover:bg-primary-hover text-navy font-bold text-lg px-8 py-3.5 rounded-xl transition-all duration-300 shadow-lg hover:shadow-primary/40 hover:-translate-y-1 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Wróć do strony głównej
            </a>
            
            <button onclick="window.history.back()" class="bg-white hover:bg-gray-50 text-navy font-semibold text-lg px-8 py-3.5 rounded-xl border border-gray-200 transition-all duration-300 shadow-sm hover:shadow-md flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Cofnij
            </button>
        </div>
    </div>
</section>
{% endblock %}
