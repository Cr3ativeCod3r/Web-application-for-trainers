<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coachly</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #374151;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f9fafb;
            padding-bottom: 60px;
        }
        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            margin-top: 40px;
        }
        .header {
            background-color: #1A252F; /* Navy */
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            color: #2ECC71; /* Green */
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .content {
            padding: 40px 30px;
            line-height: 1.6;
        }
        .content h2 {
            color: #1A252F;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .content p {
            margin: 0 0 20px 0;
            color: #4b5563;
        }
        .button {
            display: inline-block;
            background-color: #2ECC71;
            color: #1A252F !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .button:hover {
            background-color: #27ae60;
        }
        .footer {
            background-color: #f3f4f6;
            padding: 20px 30px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
        .footer p {
            margin: 0 0 10px 0;
        }
        .link-text {
            color: #2ECC71;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main" width="100%">
            <!-- Header -->
            <tr>
                <td class="header">
                    <h1>Coachly</h1>
                </td>
            </tr>
            
            <!-- Body -->
            <tr>
                <td class="content">
                    {% block content %}
                    {% endblock content %}
                </td>
            </tr>
            
            <!-- Footer -->
            <tr>
                <td class="footer">
                    <p>&copy; {% now "Y" %} Coachly. Wszystkie prawa zastrzeżone.</p>
                    <p>Wiadomość została wysłana automatycznie, prosimy na nią nie odpowiadać.</p>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
