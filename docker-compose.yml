services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=trainapp
      - POSTGRES_USER=trainuser
      - POSTGRES_PASSWORD=trainpass
    ports:
      - "5433:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=core.settings
      - API_GEMINI=${API_GEMINI}
      - DB_HOST=db
      - DB_NAME=trainapp
      - DB_USER=trainuser
      - DB_PASS=${DB_PASS:-trainpass}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@coachly.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-banaszekk123@gmail.com}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - db
    command: >
      sh -c "until uv run python manage.py migrate; do echo 'Waiting for db...'; sleep 2; done &&
             uv run python manage.py createadmin &&
             uv run python manage.py runserver 0.0.0.0:8000"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=core.settings
      - DB_HOST=db
      - DB_NAME=trainapp
      - DB_USER=trainuser
      - DB_PASS=${DB_PASS:-trainpass}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-banaszekk123@gmail.com}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
    depends_on:
      - db
      - redis
    command: >
      sh -c "uv run celery -A core worker -l info"

volumes:
  postgres_data:

